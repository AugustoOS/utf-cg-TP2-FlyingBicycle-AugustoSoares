<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TP2 - E.T.</title>
    <link rel="stylesheet" href="world.css">
</head>
<body>
    <canvas class="canvas"></canvas>

    <div id="hud">
        <button id="btnMute" title="Mute / Unmute">
            <img id="muteIcon" src="../assets/icons/unmute.png" alt="mute">
        </button>
    </div>

    <div id="mobileControls">
        <div id="dpad">
            <button id="btnUp"    class="mobileBtn">▲</button>
            <button id="btnLeft"  class="mobileBtn">◀</button>
            <button id="btnRight" class="mobileBtn">▶</button>
            <button id="btnDown"  class="mobileBtn">▼</button>
        </div>
    </div>

    <script src="../libs/3dlib.js"></script>
    <script src="../libs/webgl.js"></script>
    <script src="../libs/objloader.js"></script>

    <script src="../objects/ground.js"></script>
    <script src="../objects/moon.js"></script>
    <script src="../objects/trees.js"></script>
    <script src="../objects/bushs.js"></script>
    <script src="../objects/rocks.js"></script>
    <script src="../objects/bike.js"></script>

    <script src="../utils/camera.js"></script>
    <script src="../utils/lightning.js"></script>

    <script src="world.js"></script>
</body>
</html>
